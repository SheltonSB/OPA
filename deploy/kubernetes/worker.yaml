apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  labels: {app.kubernetes.io/name: opa-guard-worker}
spec:
  replicas: 10
  strategy:
    type: RollingUpdate
    rollingUpdate: {maxUnavailable: 1, maxSurge: 2}
  selector:
    matchLabels: {app.kubernetes.io/name: opa-guard-worker}
  template:
    metadata:
      labels: {app.kubernetes.io/name: opa-guard-worker}
    spec:
      serviceAccountName: opa-guard-worker
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 120
      securityContext: {runAsNonRoot: true, seccompProfile: {type: RuntimeDefault}}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector: {matchLabels: {app.kubernetes.io/name: opa-guard-worker}}
      containers:
        - name: worker
          image: ghcr.io/sheltonsb/opa-policy-performance-guard:1.0.0
          envFrom:
            - configMapRef: {name: opa-guard-config}
            - secretRef: {name: opa-guard-secrets}
          env: [{name: OPA_GUARD_MODE, value: worker}]
          ports: [{name: http, containerPort: 8080}]
          resources:
            requests: {cpu: "2", memory: 2Gi, ephemeral-storage: 2Gi}
            limits: {cpu: "8", memory: 8Gi, ephemeral-storage: 8Gi}
          readinessProbe: {httpGet: {path: /actuator/health/readiness, port: http}, periodSeconds: 10}
          livenessProbe: {httpGet: {path: /actuator/health/liveness, port: http}, periodSeconds: 20}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: ["ALL"]}
          volumeMounts:
            - {name: tmp, mountPath: /tmp}
            - {name: artifacts, mountPath: /artifacts, readOnly: true}
      volumes:
        - {name: tmp, emptyDir: {sizeLimit: 1Gi}}
        - {name: artifacts, persistentVolumeClaim: {claimName: opa-guard-artifacts}}
---
apiVersion: v1
kind: Service
metadata:
  name: worker
  labels: {app.kubernetes.io/name: opa-guard-worker}
spec:
  selector: {app.kubernetes.io/name: opa-guard-worker}
  ports: [{name: metrics, port: 8080, targetPort: http}]
