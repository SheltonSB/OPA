apiVersion: apps/v1
kind: Deployment
metadata:
  name: coordinator
  labels: {app.kubernetes.io/name: opa-guard-coordinator}
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate: {maxUnavailable: 0, maxSurge: 1}
  selector:
    matchLabels: {app.kubernetes.io/name: opa-guard-coordinator}
  template:
    metadata:
      labels: {app.kubernetes.io/name: opa-guard-coordinator}
    spec:
      serviceAccountName: opa-guard-coordinator
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 45
      securityContext: {runAsNonRoot: true, seccompProfile: {type: RuntimeDefault}}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector: {matchLabels: {app.kubernetes.io/name: opa-guard-coordinator}}
      containers:
        - name: coordinator
          image: ghcr.io/example/opa-policy-performance-guard:1.0.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef: {name: opa-guard-config}
            - secretRef: {name: opa-guard-secrets}
          env: [{name: OPA_GUARD_MODE, value: coordinator}]
          ports: [{name: http, containerPort: 8080}]
          resources:
            requests: {cpu: 500m, memory: 768Mi}
            limits: {cpu: "2", memory: 2Gi}
          readinessProbe: {httpGet: {path: /actuator/health/readiness, port: http}, periodSeconds: 5, failureThreshold: 3}
          livenessProbe: {httpGet: {path: /actuator/health/liveness, port: http}, periodSeconds: 10, failureThreshold: 3}
          startupProbe: {httpGet: {path: /actuator/health/liveness, port: http}, periodSeconds: 5, failureThreshold: 30}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: ["ALL"]}
          volumeMounts: [{name: tmp, mountPath: /tmp}]
      volumes: [{name: tmp, emptyDir: {sizeLimit: 128Mi}}]
---
apiVersion: v1
kind: Service
metadata:
  name: coordinator
  labels: {app.kubernetes.io/name: opa-guard-coordinator}
spec:
  selector: {app.kubernetes.io/name: opa-guard-coordinator}
  ports: [{name: http, port: 80, targetPort: http}]
