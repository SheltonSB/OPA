apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: coordinator
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    nginx.ingress.kubernetes.io/limit-rps: "100"
spec:
  ingressClassName: nginx
  tls: [{hosts: [opa-guard.example.com], secretName: opa-guard-tls}]
  rules:
    - host: opa-guard.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend: {service: {name: coordinator, port: {name: http}}}
