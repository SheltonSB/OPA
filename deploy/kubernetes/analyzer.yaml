apiVersion: apps/v1
kind: Deployment
metadata:
  name: analyzer
  labels: {app.kubernetes.io/name: opa-guard-analyzer}
spec:
  replicas: 3
  strategy: {type: RollingUpdate, rollingUpdate: {maxUnavailable: 0, maxSurge: 1}}
  selector:
    matchLabels: {app.kubernetes.io/name: opa-guard-analyzer}
  template:
    metadata:
      labels: {app.kubernetes.io/name: opa-guard-analyzer}
    spec:
      serviceAccountName: opa-guard-analyzer
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 45
      securityContext: {runAsNonRoot: true, seccompProfile: {type: RuntimeDefault}}
      containers:
        - name: analyzer
          image: ghcr.io/example/opa-policy-performance-guard:1.0.0
          envFrom:
            - configMapRef: {name: opa-guard-config}
            - secretRef: {name: opa-guard-secrets}
          env: [{name: OPA_GUARD_MODE, value: analyzer}]
          ports: [{name: http, containerPort: 8080}]
          resources:
            requests: {cpu: 500m, memory: 1Gi}
            limits: {cpu: "2", memory: 3Gi}
          readinessProbe: {httpGet: {path: /actuator/health/readiness, port: http}, periodSeconds: 5}
          livenessProbe: {httpGet: {path: /actuator/health/liveness, port: http}, periodSeconds: 10}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: {drop: ["ALL"]}
          volumeMounts: [{name: tmp, mountPath: /tmp}]
      volumes: [{name: tmp, emptyDir: {sizeLimit: 128Mi}}]
---
apiVersion: v1
kind: Service
metadata:
  name: analyzer
  labels: {app.kubernetes.io/name: opa-guard-analyzer}
spec:
  selector: {app.kubernetes.io/name: opa-guard-analyzer}
  ports: [{name: metrics, port: 8080, targetPort: http}]
