name: Platform CI and Security

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Unit and integration tests
        run: mvn --batch-mode --no-transfer-progress verify
      - name: Publish test and coverage summary
        if: always()
        run: |
          python3 scripts/summarize-verification.py target/surefire-reports target/site/jacoco/jacoco.xml >> "$GITHUB_STEP_SUMMARY"
      - name: Render Kubernetes resources
        run: kubectl kustomize deploy/kubernetes >/dev/null
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage
          path: target/site/jacoco
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: cyclonedx-sbom
          path: target/classes/META-INF/sbom/application.cdx.json

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: opa-guard:${{ github.sha }}
      - name: Scan image
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: opa-guard:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
      - name: Upload scan to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with: {sarif_file: trivy-results.sarif}
