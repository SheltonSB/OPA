name: Platform CI and Security

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Unit and integration tests
        run: mvn --batch-mode --no-transfer-progress verify
      - name: Render Kubernetes resources
        run: kubectl kustomize deploy/kubernetes >/dev/null
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: cyclonedx-sbom
          path: target/classes/META-INF/sbom/application.cdx.json

  dependency-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: OWASP dependency scan
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: mvn --batch-mode --no-transfer-progress -DskipTests org.owasp:dependency-check-maven:12.1.3:check
      - name: Upload dependency report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.*
          if-no-files-found: warn

  codeql:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with: {languages: java-kotlin}
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: opa-guard:${{ github.sha }}
      - name: Scan image
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: opa-guard:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "1"
      - name: Upload scan to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with: {sarif_file: trivy-results.sarif}
