name: Platform CI and Security

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Unit and integration tests
        run: mvn --batch-mode --no-transfer-progress verify
      - name: Require Docker-backed integration evidence
        run: python3 scripts/require-container-tests.py target/surefire-reports
      - name: Publish test and coverage summary
        if: always()
        run: |
          python3 scripts/summarize-verification.py target/surefire-reports target/site/jacoco/jacoco.xml >> "$GITHUB_STEP_SUMMARY"
          python3 scripts/summarize-verification.py target/surefire-reports target/site/jacoco/jacoco.xml --write-badges build/evidence-badges
      - name: Upload test reports
        if: always() && hashFiles('target/surefire-reports/**') != ''
        uses: actions/upload-artifact@v7
        with:
          name: surefire-test-reports
          path: target/surefire-reports
      - name: Render Kubernetes resources
        run: kubectl kustomize deploy/kubernetes >/dev/null
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-coverage
          path: target/site/jacoco
      - name: Upload evidence badges
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: evidence-badges
          path: build/evidence-badges
          if-no-files-found: warn
      - name: Upload SBOM
        uses: actions/upload-artifact@v7
        with:
          name: cyclonedx-sbom
          path: target/classes/META-INF/sbom/application.cdx.json

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: opa-guard:${{ github.sha }}
      - name: Report image vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: opa-guard:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: "0"
      - name: Upload scan to GitHub Security
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with: {sarif_file: trivy-results.sarif}
      - name: Enforce remediable vulnerability gate
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: opa-guard:${{ github.sha }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
          trivyignores: .trivyignore.yaml
