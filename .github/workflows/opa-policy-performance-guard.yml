name: OPA Policy Performance Guard

on:
  pull_request:
    paths:
      - "**/*.rego"
      - "benchmark/**"
      - "opa-guard.yml"
      - "src/**"
      - "pom.xml"

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out pull request
        uses: actions/checkout@v7
        with:
          path: candidate

      - name: Check out main branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: baseline

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: candidate/pom.xml

      - name: Set up OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: 1.18.2

      - name: Build guard
        working-directory: candidate
        run: mvn --batch-mode --no-transfer-progress verify

      - name: Benchmark and compare
        id: guard
        continue-on-error: true
        working-directory: candidate
        run: |
          java -jar target/opa-policy-performance-guard-*.jar \
            --spring.config.additional-location=file:opa-guard.yml \
            --opa-guard.baseline-policy=../baseline/policy \
            --opa-guard.candidate-policy=policy \
            --opa-guard.benchmark-dataset=benchmark/dataset.json

      - name: Add pull request summary
        if: always()
        working-directory: candidate
        run: |
          if [ -f build/reports/opa-guard.md ]; then
            cat build/reports/opa-guard.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ❌ OPA Policy Performance Guard could not produce a report" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Comment on pull request
        if: always() && github.event.pull_request.head.repo.fork == false
        uses: actions/github-script@v9
        env:
          REPORT_PATH: candidate/build/reports/opa-guard.md
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- opa-policy-performance-guard -->';
            const body = fs.existsSync(process.env.REPORT_PATH)
              ? `${marker}\n${fs.readFileSync(process.env.REPORT_PATH, 'utf8')}`
              : `${marker}\n## ❌ OPA Policy Performance Guard\n\nThe benchmark did not produce a report. Inspect the workflow logs.`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number });
            const previous = comments.find(comment => comment.user.type === 'Bot' && comment.body.includes(marker));
            if (previous) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: previous.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Upload benchmark reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: opa-policy-performance-report
          path: |
            candidate/build/reports/opa-guard.md
            candidate/build/reports/opa-guard.json
          if-no-files-found: warn

      - name: Enforce guard result
        if: steps.guard.outcome != 'success'
        run: exit 1
