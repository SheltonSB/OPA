global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: opa-guard
    metrics_path: /actuator/prometheus
    authorization:
      type: Bearer
      credentials_file: /run/secrets/prometheus_token
    static_configs:
      - targets: ["coordinator:8080", "worker:8080", "analyzer:8080"]
