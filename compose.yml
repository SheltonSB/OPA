name: opa-policy-performance-guard

services:
  postgres:
    image: postgres:17.5-alpine
    environment:
      POSTGRES_DB: opa_guard
      POSTGRES_USER: opa_guard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opa_guard -d opa_guard"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes: ["postgres-data:/var/lib/postgresql/data"]
    networks: ["data"]

  redis:
    image: redis:8.0.2-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?set REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes: ["redis-data:/data"]
    networks: ["data"]

  kafka:
    image: apache/kafka:4.0.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 32
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes: ["kafka-data:/var/lib/kafka/data"]
    networks: ["data"]

  coordinator:
    build: .
    environment: &application-environment
      OPA_GUARD_MODE: coordinator
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/opa_guard
      SPRING_DATASOURCE_USERNAME: opa_guard
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OPA_GUARD_JWK_SET_URI: ${OPA_GUARD_JWK_SET_URI:?set OPA_GUARD_JWK_SET_URI}
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      kafka: {condition: service_healthy}
    ports: ["8080:8080"]
    read_only: true
    tmpfs: ["/tmp:rw,noexec,nosuid,size=64m"]
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    networks: ["edge", "data"]

  worker:
    build: .
    environment:
      <<: *application-environment
      OPA_GUARD_MODE: worker
      OPA_GUARD_ARTIFACT_ROOT: /artifacts
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      kafka: {condition: service_healthy}
    read_only: true
    tmpfs: ["/tmp:rw,noexec,nosuid,size=256m"]
    volumes: ["./local-artifacts:/artifacts:ro"]
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    networks: ["edge", "data"]

  analyzer:
    build: .
    environment:
      <<: *application-environment
      OPA_GUARD_MODE: analyzer
    depends_on:
      postgres: {condition: service_healthy}
      kafka: {condition: service_healthy}
    read_only: true
    tmpfs: ["/tmp:rw,noexec,nosuid,size=64m"]
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    networks: ["edge", "data"]

  prometheus:
    image: prom/prometheus:v3.4.1
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.retention.time=15d"]
    volumes: ["./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro", "prometheus-data:/prometheus"]
    secrets: ["prometheus_token"]
    networks: ["edge", "data"]

  grafana:
    image: grafana/grafana:12.0.2
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - "./observability/grafana/provisioning:/etc/grafana/provisioning:ro"
      - "./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro"
      - "grafana-data:/var/lib/grafana"
    ports: ["3000:3000"]
    networks: ["edge"]

networks:
  edge: {}
  data: {internal: true}

volumes:
  postgres-data: {}
  redis-data: {}
  kafka-data: {}
  prometheus-data: {}
  grafana-data: {}

secrets:
  prometheus_token:
    file: ${PROMETHEUS_TOKEN_FILE:?set PROMETHEUS_TOKEN_FILE}
